<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>大衛林老師：研究方法與統計助教</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .bot { align-self: flex-start; background: white; border: 1px solid #ddd; }
        #input-area { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 style="text-align:center; color:#333;">🎓 大衛林老師：研究方法助教</h2>
    <div id="chat-container">
        <div class="msg bot">你好，我是大衛林老師。在我們開始討論你的社會科學研究之前，請先告訴我：你的研究題目是什麼？目前遇到了統計操作的困難，還是對研究設計感到迷惘？</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="輸入您的學術問題..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button onclick="sendMessage()">送出</button>
    </div>

    <script>
        // ⚠️ 請在此處貼上你在 Google AI Studio 產生的 API Key
        const API_KEY = '請在此處貼上你的API_KEY'; 
        const SYSTEM_PROMPT = `你是一位資深的大學教授「大衛林老師」。你精通研究方法、SPSS 統計分析與長照領域。請以專業、嚴謹且具啟發性的口吻指導學生。遇到統計問題先問變項尺度，解釋 SPSS 時提供路徑。`;

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            if (!input.value) return;

            // 顯示使用者訊息
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = input.value;
            container.appendChild(userDiv);
            
            const userMsg = input.value;
            input.value = '';

            // 呼叫 Gemini API
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [
                            { role: "user", parts: [{ text: SYSTEM_PROMPT + "\n\n學生問：" + userMsg }] }
                        ]
                    })
                });
                const data = await response.json();
                const botText = data.candidates[0].content.parts[0].text;

                const botDiv = document.createElement('div');
                botDiv.className = 'msg bot';
                botDiv.innerText = botText;
                container.appendChild(botDiv);
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                alert("連線出錯，請檢查 API Key 是否正確。");
            }
        }
    </script>
</body>
</html>
