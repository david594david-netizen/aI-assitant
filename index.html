<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大衛林老師：研究方法與統計 AI 助教</title>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #18bc9c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #ecf0f1; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* 設定區塊 */
        #setup-area { background: var(--primary-color); color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #api-key-input { padding: 8px; width: 300px; border-radius: 4px; border: none; margin-left: 10px; }
        .save-btn { padding: 8px 15px; background: var(--accent-color); border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 對話區塊 */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 18px; line-height: 1.6; position: relative; word-wrap: break-word; }
        .user { align-self: flex-end; background: #3498db; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; color: #333; border: 1px solid #ddd; border-bottom-left-radius: 2px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        
        /* 輸入區塊 */
        #input-area { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        #send-btn { padding: 10px 25px; background: var(--primary-color); color: white; border: none; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        #send-btn:hover { background: #34495e; }
        #send-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* 狀態顯示 */
        .status { font-size: 12px; color: #7f8c8d; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="setup-area">
        <strong>🎓 大衛林老師 AI 助教</strong> 
        <input type="password" id="api-key-input" placeholder="請貼上您的 Google Gemini API Key">
        <button class="save-btn" onclick="saveKey()">儲存並開始</button>
        <div style="font-size: 11px; margin-top: 5px; opacity: 0.8;">
            * 您的 API Key 將僅儲存在瀏覽器中，不會傳送到第三方伺服器。
        </div>
    </div>

    <div id="chat-container">
        <div class="msg bot">
            同學好，我是大衛林老師。在開始之前，請先於上方輸入您的 <strong>Gemini API Key</strong>。<br><br>
            設定完成後，請告訴我你的研究題目，或者你目前在 SPSS 遇到什麼困難？
        </div>
    </div>

        <input type
